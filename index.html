<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BookedUp CRM">
<meta name="theme-color" content="#1a1a1a">
<title>BookedUp CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --charcoal: #1a1a1a;
  --charcoal-light: #242424;
  --charcoal-lighter: #2e2e2e;
  --charcoal-border: #3a3a3a;
  --burnt-orange: #e07a3a;
  --burnt-orange-dim: rgba(224, 122, 58, 0.15);
  --burnt-orange-glow: rgba(224, 122, 58, 0.25);
  --amber: #c9943a;
  --amber-dim: rgba(201, 148, 58, 0.15);
  --sand: #b8a882;
  --sand-dim: rgba(184, 168, 130, 0.12);
  --text-primary: #f0ece4;
  --text-secondary: #a09a8e;
  --text-muted: #6b6560;
  --success: #4a9e6e;
  --success-dim: rgba(74, 158, 110, 0.15);
  --danger: #c45454;
  --danger-dim: rgba(196, 84, 84, 0.15);
  --info: #5a8fbf;
  --info-dim: rgba(90, 143, 191, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--charcoal);
  color: var(--text-primary);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ===== PIN SCREEN ===== */
#pin-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--charcoal);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.4s, transform 0.4s;
}
#pin-screen.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
#pin-screen .logo-mark {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 700;
  color: var(--burnt-orange);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
#pin-screen .logo-sub {
  font-size: 13px; color: var(--text-muted);
  margin-bottom: 48px; letter-spacing: 2px; text-transform: uppercase;
}
.pin-dots {
  display: flex; gap: 16px; margin-bottom: 40px;
}
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--charcoal-border);
  transition: all 0.2s;
}
.pin-dot.filled {
  background: var(--burnt-orange);
  border-color: var(--burnt-orange);
  box-shadow: 0 0 12px var(--burnt-orange-glow);
}
.pin-dot.error {
  border-color: var(--danger);
  background: var(--danger);
  animation: shake 0.4s;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.pin-pad {
  display: grid; grid-template-columns: repeat(3, 72px);
  gap: 14px;
}
.pin-key {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--charcoal-light);
  border: 1px solid var(--charcoal-border);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 24px; font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  -webkit-user-select: none; user-select: none;
}
.pin-key:active { background: var(--burnt-orange-dim); border-color: var(--burnt-orange); transform: scale(0.93); }
.pin-key.empty { visibility: hidden; }
.pin-key.backspace { font-size: 18px; }

/* ===== APP SHELL ===== */
#app { display: none; flex-direction: column; min-height: 100dvh; }
#app.active { display: flex; }

/* Header */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--charcoal);
  border-bottom: 1px solid var(--charcoal-border);
  padding: 16px 20px 0;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.header-brand {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  color: var(--burnt-orange);
  letter-spacing: -0.5px;
}
.header-actions { display: flex; gap: 8px; }
.header-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--charcoal-light);
  border: 1px solid var(--charcoal-border);
  color: var(--text-secondary);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.15s;
}
.header-btn:active { background: var(--burnt-orange-dim); color: var(--burnt-orange); }
.header-btn.active-view { background: var(--burnt-orange-dim); color: var(--burnt-orange); border-color: var(--burnt-orange); }

/* Stats bar */
.stats-bar {
  display: flex; gap: 6px; margin-bottom: 14px;
  overflow-x: auto; scrollbar-width: none;
  -ms-overflow-style: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--charcoal-light);
  border: 1px solid var(--charcoal-border);
  font-size: 12px; font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}
.stat-chip .stat-val {
  color: var(--burnt-orange);
  font-weight: 700;
  margin-right: 4px;
}

/* Pipeline tabs */
.pipeline-tabs {
  display: flex; gap: 0;
  overflow-x: auto; scrollbar-width: none;
  -ms-overflow-style: none;
}
.pipeline-tabs::-webkit-scrollbar { display: none; }
.pipe-tab {
  flex-shrink: 0;
  padding: 10px 18px;
  font-size: 13px; font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  -webkit-user-select: none; user-select: none;
}
.pipe-tab:active { color: var(--text-secondary); }
.pipe-tab.active {
  color: var(--burnt-orange);
  border-bottom-color: var(--burnt-orange);
}
.pipe-tab .tab-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  border-radius: 9px;
  background: var(--charcoal-lighter);
  font-size: 11px; font-weight: 600;
  margin-left: 6px;
  color: var(--text-muted);
}
.pipe-tab.active .tab-count {
  background: var(--burnt-orange-dim);
  color: var(--burnt-orange);
}

/* ===== CONTENT ===== */
.content { flex: 1; padding: 16px 16px 100px; }

/* Prospect Cards */
.prospect-list { display: flex; flex-direction: column; gap: 10px; }
.prospect-card {
  background: var(--charcoal-light);
  border: 1px solid var(--charcoal-border);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.2s;
}
.prospect-card.expanded { border-color: var(--burnt-orange); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }

.card-header {
  padding: 16px;
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  -webkit-user-select: none; user-select: none;
}
.card-avatar {
  width: 42px; height: 42px; border-radius: 12px;
  background: var(--burnt-orange-dim);
  color: var(--burnt-orange);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
  flex-shrink: 0;
}
.card-info { flex: 1; min-width: 0; }
.card-name {
  font-weight: 600; font-size: 15px;
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-meta {
  font-size: 12px; color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-chevron {
  color: var(--text-muted); font-size: 14px;
  transition: transform 0.2s; flex-shrink: 0;
}
.prospect-card.expanded .card-chevron { transform: rotate(180deg); color: var(--burnt-orange); }

/* Expanded card body */
.card-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--charcoal-border);
}
.prospect-card.expanded .card-body { display: block; }

.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin: 14px 0;
}
.detail-item { }
.detail-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 2px; }
.detail-value { font-size: 13px; color: var(--text-secondary); word-break: break-all; }
.detail-value a { color: var(--burnt-orange); text-decoration: none; }
.detail-value.full-width { grid-column: 1 / -1; }

/* Action buttons row */
.action-row {
  display: flex; gap: 8px; margin-top: 12px;
  flex-wrap: wrap;
}
.action-btn {
  flex: 1; min-width: 0;
  padding: 10px 8px;
  border-radius: 10px;
  border: 1px solid var(--charcoal-border);
  background: var(--charcoal-lighter);
  color: var(--text-secondary);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.15s;
  white-space: nowrap;
}
.action-btn:active { transform: scale(0.96); }
.action-btn.call { border-color: var(--success); color: var(--success); background: var(--success-dim); }
.action-btn.email { border-color: var(--burnt-orange); color: var(--burnt-orange); background: var(--burnt-orange-dim); }
.action-btn.dropin { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
.action-btn.voicemail { border-color: var(--info); color: var(--info); background: var(--info-dim); }

/* Status selector */
.status-selector {
  display: flex; gap: 6px; margin-top: 12px;
  flex-wrap: wrap;
}
.status-option {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--charcoal-border);
  background: transparent;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  text-transform: uppercase; letter-spacing: 0.5px;
  transition: all 0.15s;
}
.status-option:active { transform: scale(0.95); }
.status-option.active-status {
  border-color: var(--burnt-orange);
  background: var(--burnt-orange-dim);
  color: var(--burnt-orange);
}

/* Notes area */
.notes-section { margin-top: 14px; }
.notes-section label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted);
  display: block; margin-bottom: 6px;
}
.notes-textarea {
  width: 100%; padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--charcoal-border);
  background: var(--charcoal);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; resize: vertical;
  min-height: 60px;
  transition: border-color 0.2s;
}
.notes-textarea:focus { outline: none; border-color: var(--burnt-orange); }
.notes-save {
  margin-top: 8px;
  padding: 8px 20px;
  border-radius: 8px;
  border: none;
  background: var(--burnt-orange);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.notes-save:active { transform: scale(0.96); opacity: 0.85; }
.notes-save:disabled { opacity: 0.4; cursor: not-allowed; }

/* Touchpoint history */
.touchpoint-history { margin-top: 14px; }
.touchpoint-history .detail-label { margin-bottom: 8px; }
.tp-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--charcoal-border);
  font-size: 12px;
}
.tp-item:last-child { border-bottom: none; }
.tp-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.tp-icon.tp-call { background: var(--success-dim); color: var(--success); }
.tp-icon.tp-email { background: var(--burnt-orange-dim); color: var(--burnt-orange); }
.tp-icon.tp-dropin { background: var(--amber-dim); color: var(--amber); }
.tp-icon.tp-voicemail { background: var(--info-dim); color: var(--info); }
.tp-text { color: var(--text-secondary); line-height: 1.4; }
.tp-time { color: var(--text-muted); font-size: 11px; margin-top: 2px; }

/* ===== ACTIVITY VIEW ===== */
.activity-view { display: none; }
.activity-view.active { display: block; }
.prospect-view { display: block; }
.prospect-view.hidden { display: none; }

.activity-item {
  padding: 14px 16px;
  background: var(--charcoal-light);
  border: 1px solid var(--charcoal-border);
  border-radius: 12px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.activity-item .activity-time {
  font-size: 11px; color: var(--text-muted);
  margin-top: 4px;
}

/* ===== EMAIL MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal-sheet {
  width: 100%; max-width: 500px;
  max-height: 85dvh;
  background: var(--charcoal-light);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--charcoal-border);
  border-bottom: none;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--charcoal-border);
  border-radius: 2px;
  margin: 10px auto 0;
}
.modal-header {
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--charcoal-border);
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600;
  color: var(--text-primary);
}
.modal-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--charcoal); border: 1px solid var(--charcoal-border);
  color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.template-tabs {
  display: flex; overflow-x: auto; scrollbar-width: none;
  padding: 12px 20px;
  gap: 8px;
}
.template-tabs::-webkit-scrollbar { display: none; }
.tmpl-tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  background: var(--charcoal);
  border: 1px solid var(--charcoal-border);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.tmpl-tab.active {
  background: var(--burnt-orange-dim);
  border-color: var(--burnt-orange);
  color: var(--burnt-orange);
}

.email-preview {
  padding: 20px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-secondary);
}
.email-preview .email-subject {
  font-weight: 600; color: var(--text-primary);
  margin-bottom: 12px; font-size: 14px;
}
.email-preview .email-body { white-space: pre-wrap; }

.email-actions {
  padding: 16px 20px;
  border-top: 1px solid var(--charcoal-border);
  display: flex; gap: 10px;
}
.email-actions button {
  flex: 1; padding: 12px;
  border-radius: 10px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.email-actions button:active { transform: scale(0.97); }
.btn-copy {
  background: var(--burnt-orange);
  color: #fff;
}
.btn-mailto {
  background: var(--charcoal);
  border: 1px solid var(--charcoal-border) !important;
  color: var(--text-secondary);
}

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--charcoal-lighter);
  border: 1px solid var(--burnt-orange);
  color: var(--text-primary);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: all 0.3s;
  z-index: 600;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* ===== LOADING ===== */
.loading-spinner {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--text-muted);
  font-size: 14px;
}

/* ===== SEARCH BAR ===== */
.search-bar {
  display: none;
  padding: 0 16px 12px;
}
.search-bar.open { display: block; }
.search-input {
  width: 100%; padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--charcoal-border);
  background: var(--charcoal);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
}
.search-input:focus { outline: none; border-color: var(--burnt-orange); }
.search-input::placeholder { color: var(--text-muted); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--charcoal-border); border-radius: 2px; }

/* Quick action fab */
.fab-add {
  position: fixed; bottom: 24px; right: 20px;
  width: 54px; height: 54px; border-radius: 16px;
  background: var(--burnt-orange);
  color: #fff; border: none;
  font-size: 26px; font-weight: 300;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(224, 122, 58, 0.35);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  z-index: 50;
}
.fab-add:active { transform: scale(0.92); }

/* Add prospect modal */
.add-modal .modal-sheet { max-height: 90dvh; }
.add-form { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.form-group label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted);
  display: block; margin-bottom: 4px;
}
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--charcoal-border);
  background: var(--charcoal);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--burnt-orange); }
.form-group select { appearance: none; cursor: pointer; }
.form-submit {
  width: 100%; padding: 14px;
  border-radius: 10px; border: none;
  background: var(--burnt-orange);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.form-submit:active { transform: scale(0.97); }
.form-submit:disabled { opacity: 0.4; }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="logo-mark">BookedUp</div>
  <div class="logo-sub">Sales CRM</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key backspace" onclick="pinBack()">&larr;</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="header-top">
      <div class="header-brand">BookedUp</div>
      <div class="header-actions">
        <button class="header-btn" id="btn-search" onclick="toggleSearch()" title="Search">&#x1F50D;</button>
        <button class="header-btn active-view" id="btn-pipeline" onclick="showView('prospects')" title="Pipeline">&#9776;</button>
        <button class="header-btn" id="btn-activity" onclick="showView('activity')" title="Activity">&#x1F4CB;</button>
        <button class="header-btn" onclick="refreshData()" title="Refresh">&#x21BB;</button>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="pipeline-tabs" id="pipeline-tabs">

// ===== SUPABASE HELPERS =====
async function supaFetch(table, options = {}) {
  let url = `${SUPABASE_URL}/rest/v1/${table}`;
  const params = new URLSearchParams();
  if (options.select) params.set('select', options.select);
  if (options.order) params.set('order', options.order);
  if (options.limit) params.set('limit', options.limit);
  if (options.filters) {
    for (const [k, v] of Object.entries(options.filters)) {
      params.set(k, v);
    }
  }
  const qs = params.toString();
  if (qs) url += '?' + qs;

  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': options.prefer || 'return=representation'
  };

  const res = await fetch(url, {
    method: options.method || 'GET',
    headers,
    body: options.body ? JSON.stringify(options.body) : undefined
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase error: ${res.status} ${err}`);
  }
  return res.json();
}

  const prospect = prospects.find(p => p.id === id);
  if (!prospect) return;

  const touchpoints = prospect.touchpoints || [];
  const newTp = { type, date: new Date().toISOString() };
  touchpoints.push(newTp);
  prospect.touchpoints = touchpoints;

  // Auto-move from "new" to "contacted" on first touchpoint
  if ((prospect.status || 'new') === 'new') {
    prospect.status = 'contacted';
  }

  renderStats();
  renderPipeline();
  setTimeout(() => {
    const card = document.getElementById(`card-${id}`);
    if (card) card.classList.add('expanded');

  try {
    await supaFetch('prospects', {
      method: 'PATCH',
      filters: { id: `eq.${id}` },
      body: { touchpoints, status: prospect.status }
    });
    await logActivity(`${type} logged for ${prospect.name}`);
    showToast(`${type} logged for ${prospect.name}`);
  } catch (err) {

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' +
    d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function tpIcon(type) {
  switch(type) {
    case 'call': return '&#9742;';
    case 'email': return '&#9993;';
    case 'drop-in': return '&#9899;';
    case 'voicemail': return '&#9836;';
    default: return '&#8226;';
  }
}
</script>
